<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>

<body>

    <h1>Register</h1>
    <div th:if="${successMessage}" class="text-success">
        Registration successful! You can now <a href="/login">login</a>.
    </div>


    <form method="post" th:action="@{/register}" th:object="${registerDto}">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label for="firstName">Firstname</label>
        <input th:field="*{firstName}" placeholder="Enter your firstname" required>
        <p th:if="${#fields.hasErrors('firstName')}" class="text-danger" th:errors="*{firstName}"></p>

        <label for="lastName">Lastname</label>
        <input th:field="*{lastName}" placeholder="Enter your lastname" required>
        <p th:if="${#fields.hasErrors('lastName')}" class="text-danger" th:errors="*{lastName}"></p>

        <label for="email">Email</label>
        <input th:field="*{email}" placeholder="Enter your email" type="email" required>
        <p th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></p>

        <label for="password">Password</label>
        <input th:field="*{password}" placeholder="Enter your password" type="password" required>
        <p th:if="${#fields.hasErrors('password')}" class="text-danger" th:errors="*{password}"></p>

        <label for="confirmPassword">Confirm Password</label>
        <input th:field="*{confirmPassword}" placeholder="Confirm your password" type="password" required>
        <p th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger" th:errors="*{confirmPassword}"></p>


        <!-- Global error message (e.g. email already exists) -->
        <p th:if="${errorMessage}" class="text-danger" th:text="${errorMessage}"></p>

        <button type="submit">Register</button>

        <a href="/login">Login</a>
    </form>

</body>

</html>
