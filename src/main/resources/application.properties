spring.application.name=call-service

# --- Database Connection ---
spring.datasource.url=jdbc:mysql://localhost:3306/callerdemo?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# --- Custom Table Prefix ---
spring.jpa.hibernate.naming.physical-strategy=com.protocall_service.config.PrefixNamingStrategy

# --- Logging ---
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE